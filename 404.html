<!DOCTYPE html>
<html class="light" lang="fr">

<head>
    <meta charset="utf-8" />
    <meta content="width=device-width, initial-scale=1.0" name="viewport" />
    <meta name="description" content="Oups, la page que vous cherchez a disparu dans la brume. Retrouvons ensemble le chemin de la douceur chez Brume Coffee." />
    <title>S'égarer dans la douceur | 404 | Brume Coffee</title>
    <script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
    <link href="https://fonts.googleapis.com/css2?family=Newsreader:ital,opsz,wght@0,6..72,200..800;1,6..72,200..800&family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet" />
    <link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&display=swap" rel="stylesheet" />
    <link rel="icon" type="image/png" href="assets/android-chrome-192x192.png">
    <link rel="shortcut icon" href="assets/android-chrome-192x192.png" type="image/png">
    <script id="tailwind-config">
        tailwind.config = {
            darkMode: "class",
            theme: {
                extend: {
                    "colors": {
                        "surface": "var(--bg-primary)",
                        "on-surface": "var(--text-main)",
                        "primary": "var(--accent-color)",
                        "on-primary": "var(--inverse-color)",
                        "surface-container-low": "var(--surface-low)",
                        "surface-container-high": "var(--surface-low)",
                        "surface-container": "var(--bg-primary)",
                        "secondary-container": "var(--surface-low)",
                        "on-secondary-container": "var(--text-main)",
                        "secondary": "var(--text-main)",
                        "on-surface-variant": "var(--text-main)",
                        "outline-variant": "transparent"
                    },
                    "fontFamily": {
                        "headline": ["'The Seasons'", "serif"],
                        "body": ["Inter", "sans-serif"],
                        "label": ["Inter", "sans-serif"],
                        "serif": ["'The Seasons'", "serif"]
                    }
                }
            }
        }
    </script>
    <link rel="stylesheet" href="assets/css/theme.css" />
    <style>
        .brume-404-canvas {
            background-color: var(--bg-primary);
            position: relative;
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            overflow: hidden;
        }

        .brume-404-bg {
            position: absolute;
            inset: 0;
            background-image: url('assets/brume_photo_5.jpg');
            background-size: cover;
            background-position: center;
            filter: contrast(0.8) brightness(0.7) blur(4px);
            opacity: 0.3;
        }

        html.dark .brume-404-bg {
            opacity: 0.15;
            filter: contrast(1.2) brightness(0.4) blur(8px);
        }

        .glass-box {
            background: rgba(var(--bg-primary-rgb), 0.1);
            backdrop-filter: blur(24px) saturate(180%);
            -webkit-backdrop-filter: blur(24px) saturate(180%);
            border: 1px solid rgba(var(--accent-color-rgb), 0.2);
            box-shadow: 0 32px 64px rgba(0, 0, 0, 0.1);
        }

        .floating-fog {
            position: absolute;
            width: 150%;
            height: 150%;
            background: radial-gradient(circle at 50% 50%, rgba(var(--accent-color-rgb), 0.05), transparent 70%);
            animation: moveFog 20s ease-in-out infinite alternate;
            z-index: 1;
            pointer-events: none;
        }

        @keyframes moveFog {
            0% { transform: translate(-10%, -10%) rotate(0deg); }
            100% { transform: translate(5%, 5%) rotate(5deg); }
        }

        .ornament-fade {
            opacity: 0.4;
            transition: opacity 0.5s ease;
        }

        .ornament-fade:hover {
            opacity: 1;
        }
        
        .error-code {
            font-size: 14rem;
            line-height: 1;
            background: linear-gradient(to bottom, var(--accent-color), transparent);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            opacity: 0.15;
            letter-spacing: -0.05em;
        }
    </style>
    <script src="assets/js/theme.js"></script>
    <script src="assets/js/api.js"></script>
</head>

<body class="selection:bg-primary selection:text-on-primary">
    <!-- TopNavBar -->
    <nav class="fixed top-0 w-full z-50 bg-transparent transition-all duration-300">
        <div class="flex justify-between items-center max-w-7xl mx-auto px-6 md:px-8 py-6">
            <a class="z-50 relative" href="index.html">
                <img src="assets/logo_sans_fond.png" alt="Brume Coffee" class="h-10 md:h-12 w-auto object-contain">
            </a>
            <div class="flex items-center gap-4 z-50">
                <button id="theme-toggle" class="p-2 rounded-full hover:bg-surface-container-low transition-colors text-primary flex items-center justify-center">
                    <span class="material-symbols-outlined text-xl">dark_mode</span>
                </button>
            </div>
        </div>
    </nav>

    <div class="brume-404-canvas">
        <div class="brume-404-bg"></div>
        <div class="floating-fog"></div>
        
        <main class="relative z-10 w-full max-w-4xl px-6">
            <div class="glass-box rounded-[3rem] p-12 md:p-20 text-center relative overflow-hidden">
                
                <!-- Background Big Number -->
                <div class="absolute inset-0 flex items-center justify-center -z-10 select-none pointer-events-none">
                    <span class="font-headline error-code">404</span>
                </div>

                <!-- Floating Ornament -->
                <div class="mb-10 flex justify-center">
                    <div class="w-24 h-24 bg-surface rounded-full flex items-center justify-center shadow-lg transform hover:rotate-12 transition-transform duration-500">
                        <span class="material-symbols-outlined text-5xl text-primary animate-pulse">cloud</span>
                    </div>
                </div>

                <h1 class="font-headline text-5xl md:text-7xl text-primary italic leading-tight mb-8">
                    Le chemin s'est dissipé <br/><span class="font-serif">dans la brume.</span>
                </h1>

                <p class="font-body text-xl md:text-2xl text-on-surface-variant max-w-xl mx-auto mb-16 italic opacity-80 leading-relaxed">
                    Même les plus beaux voyages connaissent des parenthèses inattendues. Prenez une grande inspiration, et retrouvons ensemble le chemin du comptoir.
                </p>

                <div class="brume-charm-divider mb-12" aria-hidden="true">
                    <svg viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg" class="w-8 h-8 opacity-40">
                        <path d="M12 22C12 22 20 18 20 12C20 6 12 2 12 2C12 2 4 6 4 12C4 18 12 22 12 22Z" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
                        <path d="M12 2V22" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
                    </svg>
                </div>

                <div class="flex flex-col md:flex-row items-center justify-center gap-8">
                    <a href="index.html" class="group relative bg-primary text-on-primary px-12 py-5 rounded-full font-headline text-xl hover:shadow-2xl hover:shadow-primary/20 transition-all overflow-hidden">
                        <span class="relative z-10 flex items-center gap-3">
                            <span class="material-symbols-outlined text-2xl group-hover:-translate-x-1 transition-transform">home</span>
                            Retour à l'Accueil
                        </span>
                        <div class="absolute inset-0 bg-white/10 translate-y-full group-hover:translate-y-0 transition-transform duration-300"></div>
                    </a>
                    
                    <a href="menu.html" class="font-headline text-xl text-primary hover:text-secondary transition-colors underline decoration-secondary underline-offset-8 decoration-1 flex items-center gap-3">
                        <span class="material-symbols-outlined text-2xl">restaurant_menu</span>
                        Explorer la Carte
                    </a>
                </div>
            </div>
            
            <p class="mt-12 text-center text-on-surface-variant opacity-40 font-body text-sm tracking-widest uppercase">
                &copy; 2026 Brume Coffee — Levallois-Perret
            </p>
        </main>
    </div>
</body>
</html>
